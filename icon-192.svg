<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#1A1A3E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34C759"/>
      <stop offset="100%" style="stop-color:#00C6FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rc">
      <rect width="192" height="192" rx="42"/>
    </clipPath>
  </defs>

  <rect width="192" height="192" rx="42" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <g clip-path="url(#rc)" opacity="0.07">
    <line x1="0" y1="48" x2="192" y2="48" stroke="#00C6FF" stroke-width="1"/>
    <line x1="0" y1="96" x2="192" y2="96" stroke="#00C6FF" stroke-width="1"/>
    <line x1="0" y1="144" x2="192" y2="144" stroke="#00C6FF" stroke-width="1"/>
    <line x1="48" y1="0" x2="48" y2="192" stroke="#00C6FF" stroke-width="1"/>
    <line x1="96" y1="0" x2="96" y2="192" stroke="#00C6FF" stroke-width="1"/>
    <line x1="144" y1="0" x2="144" y2="192" stroke="#00C6FF" stroke-width="1"/>
  </g>

  <!-- Glow orb -->
  <circle cx="96" cy="82" r="52" fill="#007AFF" opacity="0.1" filter="url(#glow)"/>

  <!-- Ring -->
  <circle cx="96" cy="82" r="58" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="96" cy="82" r="54" fill="#0D0D1A" opacity="0.7"/>

  <!-- Checkmark -->
  <g filter="url(#glow)">
    <polyline
      points="62,82 82,104 130,60"
      fill="none"
      stroke="url(#checkGrad)"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Label -->
  <g filter="url(#glow)">
    <text
      x="96" y="164"
      font-family="'SF Pro Display', -apple-system, Arial, sans-serif"
      font-size="23"
      font-weight="900"
      fill="url(#accentGrad)"
      text-anchor="middle"
      letter-spacing="-0.5">GigaListe</text>
  </g>

  <ellipse cx="96" cy="22" rx="75" ry="18" fill="white" opacity="0.04"/>
</svg>
