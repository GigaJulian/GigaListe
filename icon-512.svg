<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#1A1A3E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34C759"/>
      <stop offset="100%" style="stop-color:#00C6FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#roundedClip)" opacity="0.07">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#00C6FF" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#00C6FF" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#00C6FF" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#00C6FF" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#00C6FF" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#00C6FF" stroke-width="1"/>
  </g>

  <!-- Glow orb behind logo -->
  <circle cx="256" cy="230" r="140" fill="#007AFF" opacity="0.08" filter="url(#glowStrong)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="230" r="158" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.5"/>

  <!-- Inner circle background -->
  <circle cx="256" cy="230" r="148" fill="#0D0D1A" opacity="0.7"/>

  <!-- Checklist lines (decorative) -->
  <g filter="url(#glow)" opacity="0.6">
    <rect x="148" y="148" width="80" height="10" rx="5" fill="url(#accentGrad)"/>
    <rect x="148" y="172" width="110" height="10" rx="5" fill="url(#accentGrad)"/>
    <rect x="148" y="196" width="90" height="10" rx="5" fill="url(#accentGrad)"/>
  </g>

  <!-- Big checkmark (main symbol) -->
  <g filter="url(#glow)">
    <polyline
      points="168,236 218,288 340,168"
      fill="none"
      stroke="url(#checkGrad)"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Bottom label: GigaListe -->
  <g filter="url(#glow)">
    <text
      x="256" y="432"
      font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
      font-size="62"
      font-weight="900"
      fill="url(#accentGrad)"
      text-anchor="middle"
      letter-spacing="-1">GigaListe</text>
  </g>

  <!-- Shine overlay at top -->
  <rect width="512" height="180" rx="112" fill="url(#bgGrad)" opacity="0.0"/>
  <ellipse cx="256" cy="60" rx="200" ry="50" fill="white" opacity="0.04"/>
</svg>
